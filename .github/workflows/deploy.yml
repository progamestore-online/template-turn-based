name: Deploy to R2

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Verify build output
        run: |
          test -d ./web/dist || { echo "::error::No build output at web/dist"; exit 1; }
          test -n "$(ls -A ./web/dist)" || { echo "::error::web/dist is empty"; exit 1; }

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          APP_ID="${GITHUB_REPOSITORY##*/}"
          EP="https://$R2_ACCOUNT_ID.r2.cloudflarestorage.com"
          aws s3 sync ./web/dist "s3://fas-apps/games-pro/$APP_ID/" \
            --endpoint-url "$EP" --delete --no-progress
          echo "Deployed games-pro/$APP_ID from ${GITHUB_SHA::7}"

      - name: Code health scan
        run: npx -y @vibecodeqa/cli@latest --json --badge --skip-tests > /dev/null 2>&1 || true

      - name: Upload code health to R2
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          APP_ID="${GITHUB_REPOSITORY##*/}"
          EP="https://$R2_ACCOUNT_ID.r2.cloudflarestorage.com"
          if [ -f .vibe-check/report.json ]; then
            aws s3 cp .vibe-check/report.json "s3://fas-apps/games-pro/$APP_ID/.vcqa/report.json" \
              --endpoint-url "$EP" --content-type application/json --no-progress
          fi
          if [ -f .vibe-check/badge.svg ]; then
            aws s3 cp .vibe-check/badge.svg "s3://fas-apps/games-pro/$APP_ID/.vcqa/badge.svg" \
              --endpoint-url "$EP" --content-type image/svg+xml --no-progress
          fi

      - name: Deploy multiplayer Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
